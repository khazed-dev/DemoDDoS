# Deploy this file to /etc/nginx/conf.d/ddos-lab.conf on EC2.
# The active defense snippets live in /etc/nginx/ddos-lab/defense/victim/.

limit_req_zone $binary_remote_addr zone=victim_per_ip:10m rate=8r/s;
limit_conn_zone $binary_remote_addr zone=victim_conn_per_ip:10m;

log_format ddos_json escape=json '{'
  '"time":"$time_iso8601",'
  '"remote_addr":"$remote_addr",'
  '"request_method":"$request_method",'
  '"request_uri":"$request_uri",'
  '"status":$status,'
  '"body_bytes_sent":$body_bytes_sent,'
  '"request_time":$request_time,'
  '"upstream_response_time":"$upstream_response_time",'
  '"upstream_status":"$upstream_status",'
  '"request_length":$request_length,'
  '"connection":$connection,'
  '"connection_requests":$connection_requests,'
  '"http_referer":"$http_referer",'
  '"http_user_agent":"$http_user_agent"'
'}';

upstream ddos_victim_upstream {
  server 127.0.0.1:3001 max_fails=3 fail_timeout=5s;
  keepalive 16;
}

upstream ddos_dashboard_upstream {
  server 127.0.0.1:3002;
  keepalive 8;
}

server {
  listen 80 default_server;
  server_name _;

  access_log /var/log/nginx/ddos-lab-access.jsonl ddos_json;
  error_log /var/log/nginx/ddos-lab-error.log warn;

  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header Connection "";

  proxy_connect_timeout 2s;
  proxy_send_timeout 8s;
  proxy_read_timeout 8s;

  error_page 503 /maintenance.html;

  location = /maintenance.html {
    root /var/www/ddos-lab;
    internal;
  }

  location /dashboard {
    proxy_pass http://ddos_dashboard_upstream;
  }

  location / {
    include /etc/nginx/ddos-lab/defense/victim/*.conf;
    proxy_pass http://ddos_victim_upstream;
  }
}

